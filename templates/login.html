{% extends 'base.html' %}
{% block title %}Connexion - Tog-Services{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-2">
  <div class="w-full max-w-md">
    <div class="bg-white shadow-xl rounded-3xl px-8 py-10">
      <h2 class="text-3xl font-extrabold text-center text-primary mb-8 tracking-tight">Connexion</h2>
      <form method="post" class="space-y-6">
        {% csrf_token %}
        <div class="relative">
          <input type="text" id="username" name="username" class="form-control block w-full px-4 py-3 text-lg bg-transparent border-2 border-gray-200 rounded-xl focus:border-primary focus:ring-2 focus:ring-primary/20 transition placeholder-transparent peer" placeholder="Email ou Nom d'utilisateur" value="{{ request.POST.username|default:'' }}" required>
          <label for="username" class="absolute left-4 top-3 text-gray-500 text-base transition-all duration-200 pointer-events-none peer-focus:-top-5 peer-focus:text-sm peer-focus:text-primary peer-placeholder-shown:top-3 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-500">Email ou Nom d'utilisateur</label>
          <span class="absolute right-4 top-3 text-gray-400"><i class="fa fa-user"></i></span>
          {% if errors.general %}<p class="mt-2 text-sm text-red-600">{{ errors.general }}</p>{% endif %}
        </div>
        <div class="relative">
          <input type="password" id="password" name="password" class="form-control block w-full px-4 py-3 text-lg bg-transparent border-2 border-gray-200 rounded-xl focus:border-primary focus:ring-2 focus:ring-primary/20 transition placeholder-transparent peer" placeholder="Mot de passe" required>
          <label for="password" class="absolute left-4 top-3 text-gray-500 text-base transition-all duration-200 pointer-events-none peer-focus:-top-5 peer-focus:text-sm peer-focus:text-primary peer-placeholder-shown:top-3 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-500">Mot de passe</label>
          <span class="absolute right-4 top-3 text-gray-400"><i class="fa fa-lock"></i></span>
        </div>
        <div class="flex justify-end">
          <a href="#" class="text-sm text-primary-600 hover:underline">Mot de passe oublié ?</a>
        </div>
        <button type="submit" class="w-full py-3 rounded-xl bg-primary-600 hover:bg-primary-700 text-white font-bold text-lg shadow transition">Se connecter</button>
      </form>
      <div class="mt-8 text-center text-gray-600 text-base">
        Pas encore de compte ? <a href="{% url 'users:register' %}" class="text-primary-600 font-semibold hover:underline">Inscrivez-vous</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

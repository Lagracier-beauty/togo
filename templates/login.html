{% extends 'base.html' %}
{% block title %}Connexion - Tog-Services{% endblock %}
{% block content %}
<div class="flex min-h-screen items-center justify-center bg-gray-50 py-8">
  <div class="w-full max-w-md">
    <div class="rounded-xl bg-white shadow-lg p-8">
      <h2 class="text-2xl font-bold text-center mb-6">Connexion</h2>
      {% if errors.general %}
        <div class="mb-4 text-red-600 text-center">{{ errors.general }}</div>
      {% endif %}
      <form method="post" class="space-y-5">
                        {% csrf_token %}
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700">Email ou Nom d'utilisateur</label>
          <input type="text" id="username" name="username" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 focus:outline-none transition" value="{{ request.POST.username|default:'' }}" required>
                        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Mot de passe</label>
          <input type="password" id="password" name="password" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 focus:outline-none transition" required>
                        </div>
        <div class="text-end">
          <a href="#" class="text-primary-600 hover:underline text-sm">Mot de passe oublié ?</a>
                        </div>
        <button type="submit" class="w-full rounded-md bg-primary-600 hover:bg-primary-700 text-white font-semibold py-2.5 transition">Se connecter</button>
                    </form>
      <div class="mt-6 text-center text-sm text-gray-600">
        Pas encore de compte ? <a href="{% url 'users:register' %}" class="text-primary-600 hover:underline">Inscrivez-vous</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Mon Profil - Tog-Services{% endblock %}
{% block content %}
<div class="container py-6">
  <h2 class="mb-5 font-bold text-2xl">Mon Profil</h2>
  <div class="row justify-content-center">
        <div class="col-md-8">
      <div class="card shadow-lg border-0 p-5">
        <h5 class="card-title font-semibold mb-4">Informations personnelles</h5>
                    <form method="post">
                        {% csrf_token %}
          <div class="mb-4">
                            <label for="name" class="form-label">Nom complet</label>
                            <input type="text" class="form-control" id="name" name="name" value="John Doe">
                        </div>
          <div class="mb-4">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="john@example.com">
                        </div>
          <div class="mb-4">
                            <label for="phone" class="form-label">Téléphone</label>
                            <input type="text" class="form-control" id="phone" name="phone" value="+228 XX XX XX XX">
                        </div>
          <button type="submit" class="btn btn-primary w-100 py-2 font-bold">Sauvegarder</button>
                    </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
